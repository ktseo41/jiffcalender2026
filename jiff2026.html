<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIFF 2026 상영 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e;
  --surface: #141417;
  --surface2: #1c1c21;
  --surface3: #252529;
  --border: #2a2a30;
  --text: #e8e8ec;
  --text-dim: #888898;
  --text-faint: #444458;
  --accent: #c8a84b;
  --accent-dim: #7a6529;
  --row-h: 42px;
  --time-scale: 1.5; /* px per minute */
  --label-w: 160px;
  --header-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* HEADER */
#app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 20px;
  height: var(--header-h);
}
.logo {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--accent);
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.logo span { color: var(--text-dim); font-size: 12px; font-weight: 400; margin-left: 6px; }

/* DAY TABS */
.day-tabs {
  display: flex;
  gap: 3px;
  overflow-x: auto;
  flex-shrink: 0;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  padding: 6px 11px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
  border: 1px solid transparent;
  color: var(--text-dim);
  transition: all 0.15s;
  font-weight: 500;
}
.day-tab:hover { background: var(--surface2); color: var(--text); }
.day-tab.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* CONTROLS BAR */
#controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  flex-shrink: 0;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-label { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
.venue-filters { display: flex; gap: 4px; flex-wrap: wrap; }
.vf-btn {
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.vf-btn:hover { border-color: var(--accent-dim); color: var(--text); }
.vf-btn.active { background: var(--surface3); border-color: var(--accent); color: var(--accent); }

.sep { width: 1px; background: var(--border); height: 20px; margin: 0 4px; flex-shrink: 0; }

.bookmark-btn {
  margin-left: auto;
  padding: 4px 12px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.bookmark-btn:hover { border-color: var(--accent); color: var(--accent); }
.bookmark-btn.has-items { border-color: var(--accent-dim); color: var(--accent); }

/* ZOOM CONTROLS */
.zoom-controls {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
  margin-left: auto;
}
.zoom-btn {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-family: inherit;
  line-height: 1;
}
.zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
.zoom-label {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 32px;
  text-align: center;
}

/* BOOKMARK HIGHLIGHT BUTTON */
.bm-highlight-btn {
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.bm-highlight-btn:hover { border-color: var(--accent); color: var(--accent); }
.bm-highlight-btn.active {
  background: rgba(200,168,75,0.15);
  border-color: var(--accent);
  color: var(--accent);
}

/* TIMETABLE AREA */
#timetable-area {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* VENUE LABELS */
#venue-labels {
  width: var(--label-w);
  flex-shrink: 0;
  overflow: hidden;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.venue-label-spacer {
  height: 32px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
#venue-label-scroll {
  flex: 1;
  overflow: hidden;
}
.venue-label {
  height: var(--row-h);
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 11px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  gap: 6px;
}
.venue-label .vgroup-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.venue-label:hover { background: var(--surface2); color: var(--text); }

/* GROUP SEPARATOR */
.venue-group-header {
  height: 22px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.venue-group-header-timeline {
  height: 22px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: relative;
}

/* TIMELINE SCROLL AREA */
#timeline-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

/* TIME AXIS */
#time-axis {
  height: 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: flex-end;
}
.time-mark {
  position: absolute;
  bottom: 0;
  font-size: 10px;
  color: var(--text-faint);
  transform: translateX(-50%);
  padding-bottom: 4px;
  white-space: nowrap;
  pointer-events: none;
}
.time-mark.full-hour { color: var(--text-dim); }

/* GRID LINES */
#grid-lines {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}
.grid-line-hour {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--border);
  opacity: 0.6;
}
.grid-line-half {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--border);
  opacity: 0.25;
}

/* ROWS */
.row-wrapper {
  position: relative;
  height: var(--row-h);
  border-bottom: 1px solid var(--border);
}
.row-wrapper:hover { background: rgba(255,255,255,0.02); }

/* FILM BLOCKS */
.film-block {
  position: absolute;
  top: 4px;
  height: calc(var(--row-h) - 8px);
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  transition: filter 0.1s, transform 0.1s;
  display: flex;
  align-items: center;
  padding: 0 6px;
  border: 1px solid rgba(0,0,0,0.2);
  z-index: 1;
  min-width: 4px;
}
.film-block:hover {
  filter: brightness(1.25);
  transform: scaleY(1.05);
  z-index: 100;
}
.film-block.bookmarked::after {
  content: '★';
  position: absolute;
  top: 1px;
  right: 3px;
  font-size: 9px;
  color: #fff;
  opacity: 0.9;
}
.film-title-text {
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  pointer-events: none;
  flex: 1;
}

/* TOOLTIP */
#tooltip {
  position: fixed;
  background: #1e1e26;
  border: 1px solid var(--accent-dim);
  border-radius: 8px;
  padding: 12px 14px;
  max-width: 280px;
  z-index: 1000;
  pointer-events: none;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#tooltip.visible { display: block; }
.tt-section { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.05em; margin-bottom: 4px; }
.tt-title { font-size: 14px; font-family: 'Nanum Myeongjo', serif; font-weight: 700; color: #fff; margin-bottom: 6px; line-height: 1.3; }
.tt-meta { font-size: 11px; color: var(--text-dim); line-height: 1.8; }
.tt-meta strong { color: var(--text); }
.tt-shorts { font-size: 10px; color: var(--text-dim); margin-top: 4px; line-height: 1.6; }
.tt-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.tt-tag { font-size: 9px; padding: 2px 6px; border-radius: 10px; background: var(--surface3); color: var(--text-dim); }
.tt-tag.gv { background: rgba(200,168,75,0.2); color: var(--accent); }
.tt-bookmark-hint { font-size: 10px; color: var(--text-faint); margin-top: 6px; text-align: right; }

/* BOOKMARKS PANEL */
#bookmarks-panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 300px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 200;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s ease;
}
#bookmarks-panel.open { transform: translateX(0); }
.bp-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.bp-header h3 { font-size: 14px; color: var(--accent); font-family: 'Nanum Myeongjo', serif; }
.bp-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; }
#bookmarks-list { flex: 1; overflow-y: auto; padding: 8px; }
.bm-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 6px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.bm-color { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }
.bm-info { flex: 1; }
.bm-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.bm-meta { font-size: 10px; color: var(--text-dim); }
.bm-remove { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 14px; flex-shrink: 0; }
.bm-remove:hover { color: #e05; }
.bp-empty { text-align: center; color: var(--text-faint); font-size: 12px; padding: 40px 20px; line-height: 1.8; }

/* LEGEND */
.legend {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.legend-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--text-dim);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.legend-item:hover { background: var(--surface3); }
.legend-item.dimmed { opacity: 0.35; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* SCROLLBAR */
#timeline-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
#timeline-scroll::-webkit-scrollbar-track { background: var(--bg); }
#timeline-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* NOW LINE */
.now-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: rgba(255,80,80,0.7);
  z-index: 5;
  pointer-events: none;
}

/* OVERLAY for bookmarks close */
#overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 150;
  background: rgba(0,0,0,0.4);
}
#overlay.open { display: block; }
</style>
</head>

  '게스트 시네필': '#c48a3a',
  '세미나': '#5a5a5a',
};

function getSectionColor(section) {
  if (!section) return '#4a4a5a';
  for (const [key, color] of Object.entries(SECTION_COLORS)) {
    if (section.includes(key.replace('특별전: ', '').replace('특별상영: ', ''))) return color;
    if (section === key) return color;
  }
  return '#5a5a6a';
}

// ============================================================
// CSV PARSE
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const row = parseLine(lines[i]);
    if (row.length < 8) continue;
    const date = row[0];
    const venue = row[1];
    const session = row[2];
    const section = row[3];
    const title = row[4];
    const shorts = row[5];
    const startTime = row[6];
    const endTime = row[7];
    const code = row[8];
    const meta = row[9] || '';
    if (!startTime || !endTime) continue;
    result.push({ date, venue, session, section, title, shorts, startTime, endTime, code, meta });
  }
  return result;
}

function parseLine(line) {
  const fields = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"' && !inQ) { inQ = true; continue; }
    if (c === '"' && inQ) { inQ = false; continue; }
    if (c === ',' && !inQ) { fields.push(cur); cur = ''; continue; }
    cur += c;
  }
  fields.push(cur);
  return fields;
}

function timeToMin(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getVenueGroup(venue) {

const TIME_START = 9 * 60 + 30; // 09:30

function getVenuesForDay(dayData) {
  const venueSet = new Map();
  dayData.forEach(row => {
    if (!venueSet.has(row.venue)) {
      venueSet.set(row.venue, getVenueGroup(row.venue));
    }
  });

  // Sort: CGV in order, Mega in order, then others
  const cgv = [], mega = [], other = [];
  venueSet.forEach((grp, v) => {
    if (grp.id === 'cgv') cgv.push(v);
    else if (grp.id === 'mega') mega.push(v);
    else other.push(v);
  });

  const sortFn = (a, b) => {
    const numA = parseInt(a.replace(/\D/g, '').slice(-2)) || 0;
    const numB = parseInt(b.replace(/\D/g, '').slice(-2)) || 0;
    return numA - numB;
  };
  cgv.sort(sortFn);
  mega.sort(sortFn);
  other.sort();

  return { cgv, mega, other };
}

function renderDay() {
  const TOTAL_WIDTH = getTotalWidth();

  const dayData = allData.filter(r => r.date === currentDay);
  const { cgv, mega, other } = getVenuesForDay(dayData);

  // Filter by active groups
  const visibleVenues = [];
  if (activeGroups.has('cgv')) visibleVenues.push(...cgv.map(v => ({ v, grp: VENUE_GROUPS[0] })));
  if (activeGroups.has('mega')) visibleVenues.push(...mega.map(v => ({ v, grp: VENUE_GROUPS[1] })));
  if (activeGroups.has('other')) visibleVenues.push(...other.map(v => ({ v, grp: VENUE_GROUPS[2] })));

  // Render venue labels
  const labelScroll = document.getElementById('venue-label-scroll');
  labelScroll.innerHTML = '';

  // Render timeline content
  const timelineContent = document.getElementById('timeline-content');
  timelineContent.innerHTML = '';
  timelineContent.style.width = TOTAL_WIDTH + 'px';

  // Time axis
  const timeAxis = document.getElementById('time-axis');
  timeAxis.innerHTML = '';
  timeAxis.style.width = TOTAL_WIDTH + 'px';

  // Grid lines (inside content)
  const gridLines = document.createElement('div');
  gridLines.id = 'grid-lines';
  gridLines.style.cssText = `position:absolute;top:0;left:0;width:${TOTAL_WIDTH}px;bottom:0;pointer-events:none;z-index:0;`;
  timelineContent.appendChild(gridLines);

  // Draw time marks and grid
  for (let t = Math.ceil(TIME_START / 30) * 30; t <= TIME_END; t += 30) {
    const x = timeToX(t);
    const isHour = t % 60 === 0;
    const h = Math.floor(t / 60);
    const m = t % 60;

    // Time mark
    const mark = document.createElement('div');
    mark.className = 'time-mark' + (isHour ? ' full-hour' : '');
    mark.style.left = x + 'px';
    mark.textContent = isHour ? `${h}:00` : `${h}:${m.toString().padStart(2,'0')}`;
    timeAxis.appendChild(mark);

    // Grid line
    const line = document.createElement('div');
    line.className = isHour ? 'grid-line-hour' : 'grid-line-half';
    line.style.left = x + 'px';
    gridLines.appendChild(line);
  }

  // Group rendering
  const groups = [
    { id: 'cgv', venues: cgv, grp: VENUE_GROUPS[0] },
    { id: 'mega', venues: mega, grp: VENUE_GROUPS[1] },
    { id: 'other', venues: other, grp: VENUE_GROUPS[2] },
  ];

  // Font sizes scale with zoom
  const blockFontSize = 10;
  const labelFontSize = 11;

  groups.forEach(({ id, venues, grp }) => {
    if (!activeGroups.has(id) || venues.length === 0) return;

    // Group header in labels
    const gh = document.createElement('div');
    gh.className = 'venue-group-header';
    gh.textContent = grp.label;
    labelScroll.appendChild(gh);

    // Group header in timeline
    const ghtl = document.createElement('div');
    ghtl.className = 'venue-group-header-timeline';
    ghtl.style.width = TOTAL_WIDTH + 'px';
    timelineContent.appendChild(ghtl);

    venues.forEach(venue => {
      // Label
      const label = document.createElement('div');
      label.className = 'venue-label';
      label.style.fontSize = labelFontSize + 'px';
      const dot = document.createElement('div');
      dot.className = 'vgroup-dot';
      dot.style.background = grp.color;
      const shortName = venue
        .replace('CGV전주고사 ', '')
        .replace('메가박스 전주객사 ', '')
        .replace('전주디지털독립영화관', '전주디지털')
        .replace('전북대학교 삼성문화회관', '전북대 삼성')
        .replace('한국소리문화의전당 모악당', '소리문화전당');
      const txt = document.createTextNode(shortName);
      label.appendChild(dot);
      label.appendChild(txt);
      labelScroll.appendChild(label);

      // Row
      const row = document.createElement('div');
      row.className = 'row-wrapper';
      row.style.width = TOTAL_WIDTH + 'px';
      timelineContent.appendChild(row);

      // Films for this venue and day
      const films = dayData.filter(r => r.venue === venue);
      films.forEach(film => {
        const startMin = timeToMin(film.startTime);
        const endMin = timeToMin(film.endTime);
        if (!startMin || !endMin) return;

        // Skip overnight (23:59 start)
        if (startMin > TIME_END) return;

        const x = timeToX(startMin);
        const w = Math.max(4, timeToX(Math.min(endMin, TIME_END)) - x);

        const color = getSectionColor(film.section);
        const isBookmarked = bookmarks.has(film.code);

        // Dimming logic: section filter OR bookmark highlight
        let isDimmed = false;
        if (bookmarkHighlight && bookmarks.size > 0) {
          isDimmed = !isBookmarked;
        } else if (activeSections) {

        const block = document.createElement('div');
        block.className = 'film-block' + (isBookmarked ? ' bookmarked' : '');
        // Bookmark highlight: highlighted items get a glowing border
        const borderColor = (bookmarkHighlight && isBookmarked)
          ? `#ffd700` : `${color}${isDimmed ? '55' : 'ff'}`;
        const bgColor = (bookmarkHighlight && isBookmarked)
          ? `${color}ee` : `${color}${isDimmed ? '22' : 'cc'}`;
        const boxShadow = (bookmarkHighlight && isBookmarked)
          ? `0 0 0 2px #ffd70088, 0 2px 8px rgba(0,0,0,0.5)` : '';

        block.style.cssText = `
          left: ${x}px;
          width: ${w}px;
          background: ${bgColor};
          border-color: ${borderColor};
          opacity: ${isDimmed ? 0.15 : 1};
          box-shadow: ${boxShadow};

        if (w > 20) {
          const titleEl = document.createElement('div');
          titleEl.className = 'film-title-text';

function showTooltip(e, film, color) {
  const hasGV = film.meta && film.meta.includes('GV');
  const sections = [];
  if (film.section) sections.push(film.section);

  let html = `<div class="tt-section" style="color:${color}">${film.section || '—'}</div>`;
  html += `<div class="tt-title">${film.title}</div>`;
  html += `<div class="tt-meta">`;
  html += `<strong>상영관</strong> ${film.venue}<br>`;
  html += `<strong>시간</strong> ${film.startTime} – ${film.endTime}`;
  if (film.session) html += ` (${film.session})`;
  html += `<br>`;
  if (film.code) html += `<strong>코드</strong> ${film.code}`;
  html += `</div>`;
  if (film.shorts) {
    html += `<div class="tt-shorts">📽 ${film.shorts}</div>`;
  }
  html += `<div class="tt-tags">`;
  if (hasGV) html += `<span class="tt-tag gv">GV</span>`;
  if (film.meta) {
    const tags = film.meta.replace('GV','').replace(/([A-Z])(\d+|All)/g,'$1$2 ').trim().split(/\s+/).filter(Boolean);
    tags.forEach(t => { if (t) html += `<span class="tt-tag">${t}</span>`; });
  }
  html += `</div>`;
  html += `<div class="tt-bookmark-hint">${bookmarks.has(film.code) ? '★ 관심 등록됨 (클릭으로 해제)' : '클릭하여 관심 목록에 추가'}</div>`;

  tooltipEl.innerHTML = html;
  tooltipEl.classList.add('visible');
  positionTooltip();
}

function moveTooltip(e) { positionTooltip(); }

function positionTooltip() {
  const z = currentZoom();
  const tw = 280, th = tooltipEl.offsetHeight || 150;
  // Mouse coords are in physical pixels; divide by zoom to get CSS coords within zoomed layout
  const mx = mouseX / z, my = mouseY / z;
  let x = mx + 16, y = my + 16;
  const vw = window.innerWidth / z, vh = window.innerHeight / z;
  if (x + tw > vw) x = mx - tw - 10;
  if (y + th > vh) y = my - th - 10;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}

function hideTooltip() { tooltipEl.classList.remove('visible'); }

// ============================================================
// BOOKMARKS
// ============================================================
function toggleBookmark(film) {
  if (bookmarks.has(film.code)) bookmarks.delete(film.code);
  else bookmarks.add(film.code);
  renderBookmarks();
  updateBookmarkCount();
}

function updateBookmarkCount() {
  const el = document.getElementById('bmCount');
  el.textContent = bookmarks.size > 0 ? `(${bookmarks.size})` : '';
  const btn = document.getElementById('bookmarkBtn');
  btn.className = 'bookmark-btn' + (bookmarks.size > 0 ? ' has-items' : '');
  // If all bookmarks removed, turn off highlight mode
  if (bookmarks.size === 0 && bookmarkHighlight) {
    bookmarkHighlight = false;
    document.getElementById('bmHighlightBtn').classList.remove('active');
  }
}

function renderBookmarks() {
  const list = document.getElementById('bookmarks-list');
  if (bookmarks.size === 0) {
    list.innerHTML = '<div class="bp-empty">관심 목록이 비어 있어요.<br>영화 블록을 클릭해서<br>추가해 보세요.</div>';
    return;
  }

  // Group by date
  const byDate = {};
  allData.forEach(row => {
    if (bookmarks.has(row.code)) {
      if (!byDate[row.date]) byDate[row.date] = [];
      byDate[row.date].push(row);
    }
  });

  let html = '';
  Object.keys(byDate).sort().forEach(date => {
    const dayLabel = DAYS.find(d => d.date === date);
    html += `<div style="font-size:10px;color:var(--accent);font-weight:700;padding:8px 4px 4px;letter-spacing:.05em;">${dayLabel ? dayLabel.label + ' ' + dayLabel.sub : date}</div>`;
    byDate[date].sort((a,b) => a.startTime.localeCompare(b.startTime)).forEach(row => {
      const color = getSectionColor(row.section);
      html += `<div class="bm-item">
        <div class="bm-color" style="background:${color}"></div>
        <div class="bm-info">
          <div class="bm-title">${row.title}</div>
          <div class="bm-meta">${row.startTime}–${row.endTime} · ${row.venue.replace('CGV전주고사 ','CGV ').replace('메가박스 전주객사 ','메가박스 ')}</div>
        </div>
        <button class="bm-remove" onclick="removeBookmark('${row.code}')">✕</button>
      </div>`;
    });
  });

  list.innerHTML = html;
}

function removeBookmark(code) {
  bookmarks.delete(code);
  renderBookmarks();
  updateBookmarkCount();
  renderDay();
}

function toggleBookmarks() {
  const panel = document.getElementById('bookmarks-panel');
  const overlay = document.getElementById('overlay');
  renderBookmarks();
  panel.classList.toggle('open');
  overlay.classList.toggle('open');
}

function closeBookmarks() {
  document.getElementById('bookmarks-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ============================================================
// LEGEND
// ============================================================
function buildLegend() {
  const legendEl = document.getElementById('legend');
  // Show key sections
  const KEY_SECTIONS = [
    '코리안시네마', '국제경쟁', '한국경쟁', '한국단편경쟁', '월드시네마', 
    '마스터즈', '시네필전주', '시네마천국', '프론트라인', '영화보다 낯선', 
    '가능한 영화', '홍콩귀환', '불면의 밤', 'J 스페셜', '전주시네마프로젝트',
    '개막작',
  ];

  KEY_SECTIONS.forEach(s => {
    const color = getSectionColor(s);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.section = s;
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${s}`;
    item.title = `${s} 필터`;
    item.onclick = () => toggleSection(s, item);
    legendEl.appendChild(item);
  });
}

function toggleSection(section, el) {
  // Disable bookmark highlight when using section filter
  if (bookmarkHighlight) {
    bookmarkHighlight = false;
    document.getElementById('bmHighlightBtn').classList.remove('active');
  }
  if (!activeSections) {
    // First click: solo this section
    activeSections = new Set([section]);
    document.querySelectorAll('.legend-item').forEach(li => {
      li.classList.toggle('dimmed', li.dataset.section !== section);
    });
  } else if (activeSections.has(section) && activeSections.size === 1) {
    // Deselect all → show all
    activeSections = null;
    document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('dimmed'));
  } else {
    // Toggle
    if (activeSections.has(section)) activeSections.delete(section);
    else activeSections.add(section);
    document.querySelectorAll('.legend-item').forEach(li => {
      li.classList.toggle('dimmed', !activeSections.has(li.dataset.section));
    });
    if (activeSections.size === 0) activeSections = null;
  }
  renderDay();
}

// ============================================================
// ZOOM
// ============================================================
function changeZoom(dir) {
  const newIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, zoomIdx + dir));
  if (newIdx === zoomIdx) return;

  // Remember scroll position ratio BEFORE zoom change
  const ts = document.getElementById('timeline-scroll');
  const scrollRatio = ts.scrollLeft / (ts.scrollWidth || 1);

  zoomIdx = newIdx;
  const z = currentZoom();
  document.getElementById('zoomLabel').textContent = Math.round(z * 100) + '%';

  // Apply CSS zoom to the entire page — scales header, controls, timeline uniformly
  document.documentElement.style.zoom = z;

  // Re-render to update computed widths (scrollWidth may differ after zoom)
  renderDay();

  // Restore scroll position proportionally after paint
  requestAnimationFrame(() => {
    const tsNew = document.getElementById('timeline-scroll');
    tsNew.scrollLeft = scrollRatio * tsNew.scrollWidth;
  });
}

// ============================================================
// BOOKMARK HIGHLIGHT
// ============================================================
function toggleBookmarkHighlight() {
  if (bookmarks.size === 0) return; // nothing to highlight
  bookmarkHighlight = !bookmarkHighlight;
  // Clear section filter when toggling bookmark highlight
  if (bookmarkHighlight && activeSections) {
    activeSections = null;
    document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('dimmed'));
  }
  const btn = document.getElementById('bmHighlightBtn');
  btn.classList.toggle('active', bookmarkHighlight);
  renderDay();
}

// ============================================================
// CONTROLS
// ============================================================
function switchDay(date) {
  currentDay = date;
  document.querySelectorAll('.day-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === date);
  });
  renderDay();
  // Scroll timeline to 10:00
  setTimeout(() => {
    const ts = document.getElementById('timeline-scroll');
    ts.scrollLeft = timeToX(10 * 60) - 20;
  }, 50);
}

function toggleGroup(id) {
  if (activeGroups.has(id)) {
    if (activeGroups.size > 1) activeGroups.delete(id);
  } else {
    activeGroups.add(id);
  }
  document.querySelectorAll('.vf-btn').forEach(btn => {
    btn.classList.toggle('active', activeGroups.has(btn.dataset.group));
  });
  renderDay();
}

// ============================================================
// INITIAL SCROLL
// ============================================================
// Apply initial zoom
document.documentElement.style.zoom = currentZoom();

setTimeout(() => {
  const ts = document.getElementById('timeline-scroll');
  ts.scrollLeft = timeToX(10 * 60) - 20;
}, 100);
</script>
