<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIFF 2026 상영 시간표</title>
<link rel="shortcut icon" href="./jiff2026/icons/favicon.ico" sizes="16x16 32x32 48x48">
<link rel="icon" href="./jiff2026/icons/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="./jiff2026/icons/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./jiff2026/style.css">
</head>
<body>

<div id="app-header">
  <button type="button" class="header-nav-toggle" id="mobileControlsToggleBtn" aria-label="필터 열기" title="필터">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4 7H20"></path>
      <path d="M4 12H20"></path>
      <path d="M4 17H20"></path>
    </svg>
  </button>
  <div class="logo">JIFF 2026 <span>전주국제영화제 상영시간표</span></div>
  <div class="day-tabs-shell" id="dayTabsShell">
    <div class="day-tabs" id="dayTabs"></div>
  </div>
  <div class="view-mode-tabs header-view-mode-tabs" id="desktopViewModeTabs" data-view-mode-tabs="desktop" aria-label="보기 모드">
    <button type="button" class="view-mode-tab" data-view-mode="schedule" data-desktop-label="상영 시간표" data-mobile-label="상영 시간표" aria-pressed="false">상영 시간표</button>
    <button type="button" class="view-mode-tab" data-view-mode="programs" data-desktop-label="별도 프로그램" data-mobile-label="별도 프로그램" aria-pressed="false">별도 프로그램</button>
    <button type="button" class="view-mode-tab" data-view-mode="combined" data-desktop-label="같이 보기" data-mobile-label="같이 보기" aria-pressed="true">같이 보기</button>
  </div>
  <div class="mobile-header-search" id="mobileHeaderSearch">
    <div class="search-shell mobile-search-shell">
      <input
        id="mobileSearchInput"
        class="search-input"
        type="search"
        placeholder="검색"
        autocomplete="off"
        spellcheck="false"
      >
      <button type="button" class="search-clear-btn" id="mobileSearchClearBtn" aria-label="검색 닫기">✕</button>
    </div>
  </div>
  <button
    type="button"
    class="header-view-toggle"
    id="mobileDesktopToggleBtn"
    aria-label="가로 보기로 전환"
    title="가로 보기"
    aria-pressed="false"
    data-view-mode="vertical"
  >
    <span class="header-view-toggle-track" aria-hidden="true">
      <span class="header-view-toggle-thumb"></span>
      <span class="header-view-toggle-option header-view-toggle-option-horizontal">가로</span>
      <span class="header-view-toggle-option header-view-toggle-option-vertical">세로</span>
    </span>
  </button>
  <button type="button" class="header-search-toggle" id="mobileSearchToggleBtn" aria-label="검색 열기" title="검색">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="11" cy="11" r="6.5"></circle>
      <path d="M16.2 16.2L21 21"></path>
    </svg>
  </button>
  <button type="button" class="bookmark-btn" id="bookmarkBtn" aria-label="관심 목록 열기" title="관심 목록">
    <span class="bookmark-btn-iconwrap" aria-hidden="true">
      <span class="bookmark-btn-star">★</span>
    </span>
    <span class="bookmark-btn-label">관심</span>
    <span id="bmCount" hidden></span>
  </button>
</div>

<div id="controls">
  <div class="search-controls">
    <label class="filter-label" for="searchInput">검색</label>
    <div class="search-shell">
      <input
        id="searchInput"
        class="search-input"
        type="search"
        placeholder="영화 제목, 감독, 단편 목록, 섹션, 코드"
        autocomplete="off"
        spellcheck="false"
      >
      <button type="button" class="search-clear-btn" id="searchClearBtn" aria-label="검색어 지우기">✕</button>
    </div>
  </div>
  <div class="mobile-controls-section-title">보기</div>
  <div class="sep"></div>
  <div class="view-mode-tabs mobile-view-mode-tabs" id="mobileViewModeTabs" data-view-mode-tabs="mobile" aria-label="보기 모드">
    <button type="button" class="view-mode-tab" data-view-mode="schedule" data-desktop-label="상영 시간표" data-mobile-label="상영 시간표" aria-pressed="false">상영 시간표</button>
    <button type="button" class="view-mode-tab" data-view-mode="programs" data-desktop-label="별도 프로그램" data-mobile-label="별도 프로그램" aria-pressed="false">별도 프로그램</button>
    <button type="button" class="view-mode-tab" data-view-mode="combined" data-desktop-label="같이 보기" data-mobile-label="같이 보기" aria-pressed="true">같이 보기</button>
  </div>
  <div class="mobile-layout-toggle-label">시간표 방향</div>
  <button type="button" class="mobile-layout-toggle-btn" id="mobileLayoutToggleBtn" aria-pressed="false" data-view-mode="vertical">
    <span class="mobile-layout-toggle-track" aria-hidden="true">
      <span class="mobile-layout-toggle-thumb"></span>
      <span class="mobile-layout-toggle-option mobile-layout-toggle-option-vertical">세로</span>
      <span class="mobile-layout-toggle-option mobile-layout-toggle-option-horizontal">가로</span>
    </span>
  </button>
  <div class="mobile-controls-section-title">상영관</div>
  <div class="sep"></div>
  <span class="filter-label">상영관</span>
  <div class="venue-filters" id="venueFilters"></div>
  <div class="mobile-controls-section-title">관심</div>
  <div class="sep"></div>
  <button type="button" class="bm-highlight-btn" id="bmHighlightBtn" title="관심 목록만 하이라이트">★ 관심만 보기</button>
  <div class="mobile-controls-section-title">섹션</div>
  <div class="sep"></div>
  <div class="legend" id="legend"></div>
</div>

<div id="timetable-area">
  <div id="venue-labels">
    <div class="venue-label-spacer"></div>
    <div id="venue-label-scroll"></div>
  </div>
  <div id="timeline-scroll">
    <div id="time-axis"></div>
    <div id="timeline-content"></div>
  </div>
</div>

<div id="mobile-schedule" aria-live="polite">
  <div id="mobile-time-labels">
    <div class="mobile-time-label-spacer"></div>
    <div id="mobile-time-label-scroll"></div>
  </div>
  <div id="mobile-grid-scroll">
    <div id="mobile-venue-axis"></div>
    <div id="mobile-grid-content"></div>
  </div>
</div>

<div id="programs-view" aria-live="polite">
  <div id="programs-view-content"></div>
</div>

<div id="mobile-notice" class="mobile-notice" aria-live="polite" aria-hidden="true">
  <div class="mobile-notice-card">
    <p class="mobile-notice-title">이 페이지는 PC에 최적화되어 있습니다.</p>
    <p class="mobile-notice-copy">가능하면 PC에서 이용해 주세요. 모바일에서는 핵심 탐색 중심으로 축약해 제공됩니다.</p>
    <button type="button" class="mobile-notice-close" id="mobileNoticeCloseBtn">살펴보기</button>
  </div>
</div>

<div id="tooltip"></div>
<div id="overlay"></div>
<div id="detail-chooser-panel" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="detailChooserTitle">
  <div class="dc-header">
    <div class="dc-heading">
      <h3 id="detailChooserTitle">상영작 목록</h3>
      <p class="dc-subtitle" id="detailChooserSubtitle"></p>
    </div>
    <button type="button" class="dc-close" id="detailChooserCloseBtn" aria-label="상영작 목록 닫기">✕</button>
  </div>
  <div id="detailChooserList"></div>
</div>
<div id="bookmarks-panel">
  <div class="bp-header">
    <h3 id="bookmarksTitle">★ 관심 목록</h3>
    <button type="button" class="bp-close" id="bookmarksCloseBtn" aria-label="관심 목록 닫기">✕</button>
    <div class="bp-actions">
      <button type="button" class="bp-clear" id="bookmarksClearBtn">전체 비우기</button>
      <button type="button" class="bp-download" id="bookmarksDownloadBtn">CSV 내려받기</button>
    </div>
  </div>
  <div id="bookmarks-list"></div>
</div>

<script defer src="./jiff2026/data.js"></script>
<script defer src="./jiff2026/config.js"></script>
<script defer src="./jiff2026/schedule-meta.js"></script>
<script defer src="./jiff2026/talktalk.js"></script>
<script defer src="./jiff2026/talktalk-runtime.js"></script>
<script defer src="./jiff2026/x-majung.js"></script>
<script defer src="./jiff2026/alley-screening.js"></script>
<script defer src="./jiff2026/forum-programs.js"></script>
<script defer src="./jiff2026/outdoor-screening.js"></script>
<script defer src="./jiff2026/app.js"></script>
</body>
</html>
