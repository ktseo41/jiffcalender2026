<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIFF 2026 상영 시간표</title>
<link rel="shortcut icon" href="./jiff2026/icons/favicon.ico" sizes="16x16 32x32 48x48">
<link rel="icon" href="./jiff2026/icons/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="./jiff2026/icons/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./jiff2026/style.css">
</head>
<body>

<div id="app-header">
  <button type="button" class="header-nav-toggle" id="mobileControlsToggleBtn" aria-label="필터 열기" title="필터">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4 7H20"></path>
      <path d="M4 12H20"></path>
      <path d="M4 17H20"></path>
    </svg>
  </button>
  <div class="logo">JIFF 2026 <span>전주국제영화제 상영시간표</span></div>
  <div class="day-tabs-shell" id="dayTabsShell">
    <div class="day-tabs" id="dayTabs"></div>
  </div>
  <div class="density-controls">
    <div class="density-selector" id="densitySelector"></div>
    <div class="density-hint" id="densityHint"></div>
  </div>
  <div class="mobile-header-search" id="mobileHeaderSearch">
    <div class="search-shell mobile-search-shell">
      <input
        id="mobileSearchInput"
        class="search-input"
        type="search"
        placeholder="검색"
        autocomplete="off"
        spellcheck="false"
      >
      <button type="button" class="search-clear-btn" id="mobileSearchClearBtn" aria-label="검색 닫기">✕</button>
    </div>
  </div>
  <button type="button" class="header-search-toggle" id="mobileSearchToggleBtn" aria-label="검색 열기" title="검색">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="11" cy="11" r="6.5"></circle>
      <path d="M16.2 16.2L21 21"></path>
    </svg>
  </button>
  <button type="button" class="bookmark-btn" id="bookmarkBtn">★ 관심 목록 <span id="bmCount"></span></button>
</div>

<div id="controls">
  <div class="search-controls">
    <label class="filter-label" for="searchInput">검색</label>
    <div class="search-shell">
      <input
        id="searchInput"
        class="search-input"
        type="search"
        placeholder="영화 제목, 감독, 단편 목록, 섹션, 코드"
        autocomplete="off"
        spellcheck="false"
      >
      <button type="button" class="search-clear-btn" id="searchClearBtn" aria-label="검색어 지우기">✕</button>
    </div>
  </div>
  <div class="mobile-controls-section-title">상영관</div>
  <div class="sep"></div>
  <span class="filter-label">상영관</span>
  <div class="venue-filters" id="venueFilters"></div>
  <div class="mobile-controls-section-title">관심</div>
  <div class="sep"></div>
  <button type="button" class="bm-highlight-btn" id="bmHighlightBtn" title="관심 목록만 하이라이트">★ 관심만 보기</button>
  <div class="mobile-controls-section-title">섹션</div>
  <div class="sep"></div>
  <div class="legend" id="legend"></div>
</div>

<div id="timetable-area">
  <div id="venue-labels">
    <div class="venue-label-spacer"></div>
    <div id="venue-label-scroll"></div>
  </div>
  <div id="timeline-scroll">
    <div id="time-axis"></div>
    <div id="timeline-content"></div>
  </div>
</div>

<div id="mobile-schedule" aria-live="polite">
  <div id="mobile-time-labels">
    <div class="mobile-time-label-spacer"></div>
    <div id="mobile-time-label-scroll"></div>
  </div>
  <div id="mobile-grid-scroll">
    <div id="mobile-venue-axis"></div>
    <div id="mobile-grid-content"></div>
  </div>
</div>

<div id="mobile-notice" class="mobile-notice" aria-live="polite" aria-hidden="true">
  <div class="mobile-notice-card">
    <p class="mobile-notice-kicker">모바일 안내</p>
    <p class="mobile-notice-title">모바일에서도 시간표 감각을 유지하도록 축을 바꿨습니다.</p>
    <p class="mobile-notice-copy">아래로 내리면 시간 순서대로 보고, 좌우로 움직이면 상영관을 비교할 수 있습니다.</p>
    <button type="button" class="mobile-notice-close" id="mobileNoticeCloseBtn">살펴보기</button>
  </div>
</div>

<div id="tooltip"></div>
<div id="overlay"></div>
<div id="detail-chooser-panel" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="detailChooserTitle">
  <div class="dc-header">
    <div class="dc-heading">
      <h3 id="detailChooserTitle">상영작 목록</h3>
      <p class="dc-subtitle" id="detailChooserSubtitle"></p>
    </div>
    <button type="button" class="dc-close" id="detailChooserCloseBtn" aria-label="상영작 목록 닫기">✕</button>
  </div>
  <div id="detailChooserList"></div>
</div>
<div id="bookmarks-panel">
  <div class="bp-header">
    <h3>★ 관심 목록</h3>
    <button type="button" class="bp-close" id="bookmarksCloseBtn" aria-label="관심 목록 닫기">✕</button>
    <div class="bp-actions">
      <button type="button" class="bp-clear" id="bookmarksClearBtn">전체 비우기</button>
      <button type="button" class="bp-download" id="bookmarksDownloadBtn">CSV 내려받기</button>
    </div>
  </div>
  <div id="bookmarks-list"></div>
</div>

<script defer src="./jiff2026/data.js"></script>
<script defer src="./jiff2026/config.js"></script>
<script defer src="./jiff2026/directors.js"></script>
<script defer src="./jiff2026/app.js"></script>
</body>
</html>
